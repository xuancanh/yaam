# Dev Kitchen Sink — the reference addon.
# Exercises every capability the addon platform exposes; read it side by side
# with docs/addons.md and toolkit/README.md. Built on the toolkit via
# @include markers (resolved at install/pack time). Pack with:
#   node scripts/pack-addon.mjs registry/packages/dev-kitchen-sink
manifest: 3
name: Dev Kitchen Sink
version: 1.0.0
icon: 🧪
description: Developer reference — a tab that exercises every addon capability (state, sessions, tasks incl. review verbs, templates, schedules, storage, allowlisted HTTP, keychain secrets, the addon's own agent, UI calls), plus all four hooks, a Master tool, and a masterPromptAppend. Built on toolkit/sdk.js + ui.css.
author: yaam

# every scope the RPC surface offers (exec is not RPC-callable) — a real addon
# should request only what it uses
permissions:
  - state:read
  - sessions:send
  - sessions:launch
  - tasks
  - schedules
  - agent
  - master:prompt
  - ui
  - storage
  - http
  - secrets

hosts:
  - api.github.com

secrets:
  - name: DEMO_TOKEN
    label: any string — only used to demo {{secret:…}} header templating

view: view.html

tools:
  - name: sink_echo
    description: Kitchen-sink demo tool — echoes its input back with a state summary, proving Master can call addon tools.
    input:
      text: string! · anything; it comes straight back
    handler: tools/sink_echo.js

hooks:
  onSessionExit: hooks/log.js
  onNeedsInput: hooks/log.js
  onTaskMoved: hooks/log.js
  onCronFired: hooks/log.js
  masterPromptAppend: When the user asks what addons can do, mention that the Dev Kitchen Sink tab demonstrates the whole addon API.

# the addon's own agent — wake it from the tab's Agent section. Add
# `every: "*/30 * * * *"` to wake it on a cron (the mini-monitor pattern), or
# `on: [onTaskMoved]` to wake it on events.
agent:
  system: prompts/agent.md
