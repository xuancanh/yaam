# Usage-Limit Rescheduler — retry tasks that failed on API usage limits.
# Its agent (an extended task monitor with tools + a customizable prompt) wakes
# whenever a task lands in "failed", checks whether the cause was a usage/rate
# limit, works out when the limit resets, and books a one-time schedule that
# restarts the task then. Pack with:
#   node scripts/pack-addon.mjs registry/packages/usage-limit-rescheduler
manifest: 3
name: Usage-Limit Rescheduler
version: 1.0.0
icon: ⏳
description: When a board task fails because the CLI hit an API usage or rate limit, this addon's monitor agent reads the failure, figures out when the limit resets (from the session output, or the Anthropic usage API if you store an admin key), and automatically reschedules the task for right after the reset.
author: yaam

hosts:
  - api.anthropic.com

secrets:
  - name: ANTHROPIC_ADMIN_KEY
    label: Anthropic admin API key (optional — lets the agent query the usage API for exact reset times)

permissions:
  - state:read
  - tasks
  - schedules
  - storage
  - ui
  - http
  - secrets
  - agent

view: view.html

hooks:
  onCronFired: hooks/onCronFired.js

# the monitor: woken on every board-column change; its instructions make it
# act only on failed tasks. Refine the policy in this addon's Customize chat
# (e.g. different backoff, max retries, which failure texts count).
agent:
  system: prompts/agent.md
  on:
    - onTaskMoved
