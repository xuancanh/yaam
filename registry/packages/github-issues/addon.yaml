# GitHub Issues — sync repositories' open issues into a triage inbox.
# A cron pulls new issues over the addon HTTP API (token in the OS keychain)
# from every enabled repo. Each issue moves through inbox → synced (linked to a
# board task) or ignored/archived; optionally the addon's own triage agent
# files the tasks, and finished tasks close their issue on GitHub. Pack with:
#   node scripts/pack-addon.mjs registry/packages/github-issues
manifest: 3
name: GitHub Issues
version: 2.1.0
icon: 🐙
description: A GitHub issue triage inbox — sync open issues from any number of repos on a schedule, spawn linked board tasks (or let the addon's customizable triage agent decide), track their progress, and optionally close the issue on GitHub when the task is done. Token stays in the OS keychain.
author: yaam

hosts:
  - api.github.com

secrets:
  - name: GITHUB_TOKEN
    label: GitHub personal access token (repo scope; optional for public repos, required to close issues)

permissions:
  - state:read
  - tasks
  - schedules
  - storage
  - ui
  - http
  - secrets
  - agent

view: view.html

hooks:
  onCronFired: hooks/onCronFired.js
  onTaskMoved: hooks/onTaskMoved.js

# the triage agent — auto mode hands new issues to it; refine its policy in
# the addon's Customize chat (e.g. "only bugs", "skip anything labelled docs")
agent:
  system: prompts/agent.md
