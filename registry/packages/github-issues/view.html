<!DOCTYPE html><html><head><style>
body{margin:0;background:#0A0B0F;color:#E7E9F0;font-family:'IBM Plex Sans',system-ui,sans-serif;padding:22px;max-width:860px}
h1{font-size:15px;margin:0 0 4px;display:flex;gap:8px;align-items:center}
small{color:#8B93A1}
h2{font-size:10.5px;letter-spacing:.5px;color:#8B93A1;margin:22px 0 8px;text-transform:uppercase}
.card{background:#12151C;border:1px solid #1a1e26;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
input{background:#0A0B0F;border:1px solid #2a2f3a;border-radius:7px;color:#E7E9F0;font-size:11.5px;padding:6px 9px;outline:none}
button{background:transparent;border:1px solid #2a2f3a;border-radius:7px;color:#E7E9F0;font-size:11.5px;padding:6px 12px;cursor:pointer}
button:hover{border-color:#F5C451;color:#F5C451}
button.primary{border-color:rgba(61,220,151,.5);color:#3DDC97}
label{font-size:10.5px;color:#8B93A1}
.chk{display:flex;gap:6px;align-items:center;font-size:11.5px;color:#8B93A1;cursor:pointer}
.iss{display:flex;gap:10px;align-items:flex-start}
.iss b{font-size:12.5px}
.iss .body{font-size:11.5px;color:#8B93A1;margin-top:3px;line-height:1.45;max-height:54px;overflow:hidden}
.lbl{font-family:'JetBrains Mono',monospace;font-size:9.5px;border:1px solid #2a2f3a;border-radius:4px;padding:1px 6px;color:#8B93A1;margin-left:6px}
.mono{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#8B93A1}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;background:#3a4150}
.dot.on{background:#3DDC97}
.empty{color:#5a6170;font-size:12px;padding:6px 0}
a{color:#F5C451;text-decoration:none;font-size:11px}
</style></head><body>
<h1>🐙 GitHub Issues</h1>
<small>open issues → review queue → board tasks · fetched on a schedule with a keychain-stored token</small>

<h2>Repository</h2>
<div class="card">
  <div class="row">
    <input id="owner" placeholder="owner" style="width:130px">
    <span style="color:#5a6170">/</span>
    <input id="repo" placeholder="repo" style="width:170px">
    <input id="labels" placeholder="labels filter (comma-sep, optional)" style="width:210px">
    <input id="cwd" placeholder="workdir for tasks (optional)" style="flex:1;min-width:160px">
    <button class="primary" onclick="saveCfg()">Save</button>
  </div>
  <div class="row" style="margin-top:10px">
    <span class="mono"><span id="tokDot" class="dot"></span><span id="tokTxt">token…</span></span>
    <span style="flex:1"></span>
    <label class="chk"><input type="checkbox" id="auto"> auto-triage new issues (the addon's agent files the tasks)</label>
    <label class="chk"><input type="checkbox" id="autostart"> agent may also start them</label>
  </div>
</div>

<h2>Sync</h2>
<div class="card row">
  <button id="schedBtn" onclick="toggleSchedule()">…</button>
  <span class="mono">every 30 min while enabled</span>
  <span style="flex:1"></span>
  <span id="lastSync" class="mono"></span>
  <button onclick="syncNow()">Sync now</button>
</div>

<h2>Queue — new issues awaiting review</h2>
<div id="queue"></div>

<h2>Agent triage log</h2>
<div id="tri" class="card mono" style="max-height:130px;overflow-y:auto"></div>

<script>
'use strict'
let seq = 0
const pending = {}
function call(method, ...args){
  return new Promise((resolve, reject) => {
    const callId = 'c' + (++seq)
    pending[callId] = { resolve, reject }
    parent.postMessage({ type: 'yaam:call', callId, method, args }, '*')
  })
}
window.addEventListener('message', e => {
  const d = e.data
  if (d && d.type === 'yaam:result' && pending[d.callId]) {
    d.error ? pending[d.callId].reject(new Error(d.error)) : pending[d.callId].resolve(d.result)
    delete pending[d.callId]
  }
  if (d && d.type === 'yaam:state') refresh()
})
const esc = t => String(t == null ? '' : t).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))

let cfg = {}
async function load(){
  cfg = (await call('storage.get', 'config')) || {}
  document.getElementById('owner').value = cfg.owner || ''
  document.getElementById('repo').value = cfg.repo || ''
  document.getElementById('labels').value = cfg.labels || ''
  document.getElementById('cwd').value = cfg.cwd || ''
  document.getElementById('auto').checked = !!cfg.auto
  document.getElementById('autostart').checked = !!cfg.autostart
  document.getElementById('schedBtn').textContent = cfg.schedOn ? 'Disable schedule' : 'Enable schedule'
  try {
    const secrets = await call('secrets.list')
    const tok = secrets.find(s => s.name === 'GITHUB_TOKEN')
    document.getElementById('tokDot').className = 'dot' + (tok && tok.set ? ' on' : '')
    document.getElementById('tokTxt').textContent = tok && tok.set ? 'GITHUB_TOKEN set (keychain)' : 'no token — public repos only · set it in Addons → GitHub Issues'
  } catch (e) {
    document.getElementById('tokTxt').textContent = 'grant the "secrets" scope to check token status'
  }
  refresh()
}
async function saveCfg(){
  cfg = { ...cfg,
    owner: document.getElementById('owner').value.trim(),
    repo: document.getElementById('repo').value.trim(),
    labels: document.getElementById('labels').value.trim(),
    cwd: document.getElementById('cwd').value.trim(),
    auto: document.getElementById('auto').checked,
    autostart: document.getElementById('autostart').checked,
  }
  await call('storage.set', 'config', cfg)
  await call('flash', 'saved')
}
async function toggleSchedule(){
  if (cfg.schedOn) {
    await call('schedules.remove', 'github-issues-sync')
    cfg.schedOn = false
  } else {
    await saveCfg()
    if (!cfg.owner || !cfg.repo) { await call('flash', 'set owner/repo first'); return }
    await call('schedules.add', { name: 'github-issues-sync', schedule: '*/30 * * * *' })
    cfg.schedOn = true
  }
  await call('storage.set', 'config', cfg)
  document.getElementById('schedBtn').textContent = cfg.schedOn ? 'Disable schedule' : 'Enable schedule'
}

async function syncNow(){
  await saveCfg()
  if (!cfg.owner || !cfg.repo) { await call('flash', 'set owner/repo first'); return }
  let headers = { accept: 'application/vnd.github+json' }
  try {
    const secrets = await call('secrets.list')
    if (secrets.some(s => s.name === 'GITHUB_TOKEN' && s.set)) headers.authorization = 'Bearer {{secret:GITHUB_TOKEN}}'
  } catch (e) { /* secrets scope not granted — try anonymously */ }
  const labels = cfg.labels ? '&labels=' + encodeURIComponent(cfg.labels) : ''
  let res
  try {
    res = await call('http.request', 'GET',
      'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/issues?state=open&per_page=50&sort=created&direction=desc' + labels,
      { headers })
  } catch (e) { await call('flash', String(e.message || e).slice(0, 76)); return }
  if (res.status !== 200) { await call('flash', 'GitHub replied HTTP ' + res.status); return }
  const seen = (await call('storage.get', 'seen')) || []
  const queue = (await call('storage.get', 'queue')) || []
  const fresh = JSON.parse(res.text)
    .filter(i => !i.pull_request)
    .filter(i => seen.indexOf(i.number) === -1 && !queue.some(q => q.number === i.number))
    .map(i => ({ number: i.number, title: i.title, body: (i.body || '').slice(0, 2000), labels: (i.labels || []).map(l => l.name), url: i.html_url, at: Date.now() }))
  await call('storage.set', 'queue', queue.concat(fresh).slice(-100))
  await call('storage.set', 'lastSync', { at: Date.now(), found: fresh.length, status: res.status })
  await call('flash', fresh.length + ' new issue(s)')
  if (fresh.length && cfg.auto) {
    await call('agent.wake', 'New GitHub issues arrived — triage them per your instructions:\n\n'
      + JSON.stringify(fresh.map(f => ({ number: f.number, title: f.title, labels: f.labels, body: f.body.slice(0, 400) })), null, 2))
  }
  refresh()
}

async function addToBoard(number){
  const queue = (await call('storage.get', 'queue')) || []
  const it = queue.find(q => q.number === number)
  if (!it) return
  await call('tasks.add', ('#' + it.number + ' · ' + it.title).slice(0, 120), 'backlog', {
    description: it.body + '\n\n' + it.url,
    cwd: cfg.cwd || undefined,
  })
  await dismiss(number, true)
  await call('flash', 'task filed for #' + number)
}
async function dismiss(number, silent){
  const queue = (await call('storage.get', 'queue')) || []
  const seen = (await call('storage.get', 'seen')) || []
  await call('storage.set', 'queue', queue.filter(q => q.number !== number))
  if (seen.indexOf(number) === -1) await call('storage.set', 'seen', seen.concat([number]).slice(-500))
  if (!silent) refresh(); else refresh()
}

async function refresh(){
  const queue = (await call('storage.get', 'queue')) || []
  const el = document.getElementById('queue')
  el.innerHTML = ''
  for (const it of queue.slice().reverse()) {
    const d = document.createElement('div')
    d.className = 'card iss'
    d.innerHTML = '<div style="flex:1;min-width:0"><b>#' + it.number + ' · ' + esc(it.title) + '</b>'
      + it.labels.map(l => '<span class="lbl">' + esc(l) + '</span>').join('')
      + '<div class="body">' + esc(it.body.slice(0, 240)) + '</div>'
      + '<a href="' + esc(it.url) + '" target="_blank">' + esc(it.url) + '</a></div>'
    const add = document.createElement('button'); add.className = 'primary'; add.textContent = 'Add to board'; add.onclick = () => addToBoard(it.number)
    const dis = document.createElement('button'); dis.textContent = 'Dismiss'; dis.onclick = () => dismiss(it.number)
    d.appendChild(add); d.appendChild(dis)
    el.appendChild(d)
  }
  if (!queue.length) el.innerHTML = '<div class="empty">queue is empty — enable the schedule or hit Sync now</div>'
  const last = await call('storage.get', 'lastSync')
  document.getElementById('lastSync').textContent = last ? 'last sync ' + new Date(last.at).toLocaleTimeString() + ' · +' + last.found : 'never synced'
  const tri = (await call('storage.get', 'triageLog')) || []
  document.getElementById('tri').innerHTML = tri.length ? tri.map(t => '<div>' + esc(t) + '</div>').join('') : '<span class="empty">agent has not triaged anything yet</span>'
}
load()
parent.postMessage({ type: 'yaam:getState' }, '*')
</script></body></html>
