<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>YAAM Remote</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; }
  body { background:#08090c; color:#e7e9f0; font: 14px/1.5 system-ui, sans-serif; padding: 14px 14px 40px; }
  h1 { font-size: 15px; display:flex; align-items:center; gap:8px; margin-bottom: 4px; }
  h1 .dot { width:8px;height:8px;border-radius:50%;background:#3ddc97; }
  .sub { color:#626b79; font-size:11px; margin-bottom:14px; }
  h2 { font-size:10px; letter-spacing:.6px; color:#8b93a1; margin:18px 0 8px; font-family: ui-monospace, monospace; }
  .card { background:#0d0f14; border:1px solid #23272f; border-radius:12px; padding:11px 13px; margin-bottom:8px; }
  .row { display:flex; align-items:center; gap:8px; }
  .name { font-weight:600; font-size:13px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pill { font-size:10px; font-weight:700; padding:1px 8px; border-radius:99px; border:1px solid #2c313b; color:#8b93a1; flex-shrink:0; }
  .pill.running { color:#3ddc97; border-color:rgba(61,220,151,.4); }
  .pill.needs { color:#ffb020; border-color:rgba(255,176,32,.4); }
  .pill.error { color:#ff7a7a; border-color:rgba(255,92,92,.4); }
  .meta { color:#626b79; font-size:11px; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .action { color:#ffb020; font-size:12px; margin-top:5px; }
  .appr { border-color: rgba(255,176,32,.45); }
  .appr .what { font-family: ui-monospace, monospace; font-size:11.5px; color:#c7ccd6; margin:6px 0 9px; word-break:break-all; max-height:80px; overflow:auto; }
  .btns { display:flex; gap:8px; }
  button { flex:1; padding:9px; border-radius:9px; border:none; font-weight:700; font-size:13px; }
  .allow { background:#3ddc97; color:#04240f; }
  .deny { background:transparent; border:1px solid #2c313b; color:#9aa3b2; }
  .empty { color:#626b79; font-size:12px; padding:8px 2px; }
  .err { color:#ff7a7a; font-size:12px; padding:10px 2px; }
  .spend { font-family: ui-monospace, monospace; color:#8b93a1; font-size:11px; flex-shrink:0; }
</style>
</head>
<body>
<h1><span class="dot" id="live"></span> YAAM Remote</h1>
<div class="sub" id="sub">connecting…</div>
<div id="approvals"></div>
<div id="fleet"></div>
<script>
const token = new URLSearchParams(location.search).get('t') || ''
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))

async function decide(kind, id, agentId, ok) {
  await fetch('/api/decision?t=' + encodeURIComponent(token), {
    method: 'POST',
    body: JSON.stringify({ kind, id, agent_id: agentId || '', ok }),
  }).catch(() => {})
  poll()
}
window.decide = decide

function render(s) {
  document.getElementById('sub').textContent =
    (s.workspace || 'workspace') + ' · ' + new Date(s.ts || Date.now()).toLocaleTimeString()
  const ap = document.getElementById('approvals')
  const approvals = s.approvals || []
  ap.innerHTML = '<h2>APPROVALS · ' + approvals.length + '</h2>' + (approvals.length ? approvals.map(a =>
    '<div class="card appr"><div class="row"><span class="name">' + esc(a.label) + '</span></div>' +
    '<div class="what">' + esc(a.detail) + '</div>' +
    '<div class="btns">' +
    '<button class="deny" onclick="decide(\'' + esc(a.kind) + '\',\'' + esc(a.id) + '\',\'' + esc(a.agentId) + '\',false)">Deny</button>' +
    '<button class="allow" onclick="decide(\'' + esc(a.kind) + '\',\'' + esc(a.id) + '\',\'' + esc(a.agentId) + '\',true)">Allow</button>' +
    '</div></div>').join('') : '<div class="empty">nothing waiting on you</div>')

  const fleetEl = document.getElementById('fleet')
  const sessions = s.sessions || []
  const tasks = s.tasks || []
  fleetEl.innerHTML =
    '<h2>SESSIONS · ' + sessions.length + '</h2>' + (sessions.length ? sessions.map(x =>
      '<div class="card"><div class="row"><span class="name">' + esc(x.name) + '</span>' +
      '<span class="spend">$' + Number(x.cost || 0).toFixed(2) + '</span>' +
      '<span class="pill ' + esc(x.status) + '">' + esc(x.status) + '</span></div>' +
      (x.task ? '<div class="meta">task · ' + esc(x.task) + '</div>' : '') +
      (x.summary ? '<div class="meta">' + esc(x.summary) + '</div>' : '') +
      (x.actionNeeded ? '<div class="action">⚠ ' + esc(x.actionNeeded) + '</div>' : '') +
      '</div>').join('') : '<div class="empty">no live sessions</div>') +
    '<h2>TASKS · ' + tasks.length + '</h2>' + (tasks.length ? tasks.map(t =>
      '<div class="card"><div class="row"><span class="name">' + esc(t.title) + '</span>' +
      '<span class="pill' + (t.awaitingUser ? ' needs' : '') + '">' + esc(t.col) + '</span></div>' +
      (t.watcherNote ? '<div class="meta">⌁ ' + esc(t.watcherNote) + '</div>' : '') +
      '</div>').join('') : '<div class="empty">no watched tasks</div>')
}

async function poll() {
  try {
    const res = await fetch('/api/state?t=' + encodeURIComponent(token))
    if (!res.ok) throw new Error('HTTP ' + res.status)
    render(await res.json())
    document.getElementById('live').style.background = '#3ddc97'
  } catch (e) {
    document.getElementById('live').style.background = '#ff5c5c'
    document.getElementById('sub').textContent = 'disconnected — ' + e.message
  }
}
poll()
setInterval(poll, 2500)
</script>
</body>
</html>
